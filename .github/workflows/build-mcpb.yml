name: Build and Release MCPB Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build-mcpb:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install MCPB CLI
      run: npm install -g @anthropic-ai/mcpb
      
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "fastmcp>=2.12.0,<3.0.0"
        pip install -r requirements.txt
        
    - name: Create dist directory
      run: mkdir -p dist
        
    - name: Validate manifest.json
      run: |
        cd mcpb
        mcpb validate manifest.json
      
    - name: Build MCPB package
      run: |
        cd mcpb
        mcpb pack . ../dist/beyondcompare-mcp.mcpb
        
    - name: Verify package
      run: |
        if (Test-Path "dist/beyondcompare-mcp.mcpb") {
          $size = (Get-Item "dist/beyondcompare-mcp.mcpb").Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          Write-Output "Package size: $sizeMB MB"
          if ($sizeMB -gt 10) { 
            Write-Warning "Package is large (>10MB)"
          }
        } else {
          Write-Error "Package not found"
          exit 1
        }
      shell: pwsh
        
    - name: Sign MCPB package (optional)
      if: ${{ secrets.MCPB_SIGNING_KEY }}
      run: |
        echo "${{ secrets.MCPB_SIGNING_KEY }}" > signing.key
        mcpb sign --key signing.key dist/*.mcpb
        rm signing.key
        
    - name: Upload MCPB artifact
      uses: actions/upload-artifact@v3
      with:
        name: mcpb-package
        path: dist/*.mcpb
        retention-days: 90
        
    - name: Build Python package
      run: python -m build
      
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.mcpb
          dist/*.whl
          dist/*.tar.gz
        generate_release_notes: true
        draft: false
        prerelease: false
        body: |
          ## Beyond Compare MCP Release
          
          Download the `.mcpb` file below and drag it to Claude Desktop for one-click installation.
          
          ### Installation
          1. Download the `.mcpb` file from the assets below
          2. Drag the file to Claude Desktop
          3. Configure Beyond Compare path and preferences
          4. Restart Claude Desktop
          
          ### Features
          - 🔍 **File Comparison**: Compare files with Beyond Compare
          - 📁 **Folder Comparison**: Compare directories with detailed reports
          - 🔄 **Folder Synchronization**: Mirror, update, or backup folders
          - 💿 **Multimedia Drive Scanner**: Scan drives E:, F:, K:, L: for inventory
          - 🔍 **Duplicate Detection**: Find duplicate multimedia files
          - 🔌 **USB Drive Detection**: Monitor connected USB drives
          
          ### Dependencies
          - Beyond Compare 3, 4, or 5 (auto-detected)
          - FastMCP 2.12.0+ (bundled)
          - Python 3.10+ (built into Claude Desktop)
          
          ### What's New
          See the auto-generated release notes below.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/tags/')
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
